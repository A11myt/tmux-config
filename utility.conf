#   tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude --continue"; \
#   tmux switch-client -t "$SESSION"'

bind -r y run-shell "SESSION=\"claude-\$(echo #{pane_current_path} | md5sum | cut -c1-8)\"; \
  tmux has-session -t \"\$SESSION\" 2>/dev/null || \
  tmux new-session -d -s \"\$SESSION\" -c \"#{pane_current_path}\" \"claude --continue\"; \
  tmux display-popup -w 80% -h 80% -E \"tmux attach-session -t \$SESSION\""

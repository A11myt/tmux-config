##### COPY MODE (vi-style) ###################################################

set-window-option -g mode-keys vi

# Enter copy mode with prefix + [  (tmux default, kept)
# Easier: prefix + v
bind v copy-mode

# In copy mode: v = start selection, V = line selection, y = yank, q = quit
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w 80% -h 80% -E lazygit

# Run Claude Code in a separate session



source ~/.config/tmux/utility.conf

##### COLORS / ACCENT #######################################################

set -g @accent       "#ff6a00"   # McLaren-Orange
set -g @fg_default   "#dcdfe4"
set -g @fg_dim       "#a9a9a9"
set -g @fg_muted     "#666666"
set -g @fg_active    "#ffffff"
set -g @bg_status    "#0f0f0f"

# Truecolor
set-option -ga terminal-overrides ',xterm-256color:Tc'

##### STATUSBAR – ULTRA MINIMAL #############################################

set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify centre
# set -g status-keys emacs

# flach, keine extra Balkenfarbe außer leichtem dunklen Hintergrund
set -g status-style "bg=#{@bg_status},fg=#{@fg_default}"

# Status-Limits eher klein, um es kompakt zu halten
set -g status-left-length 30
set -g status-right-length 80

##### LEFT – ARCH / SESSION #################################################

# • in Orange (NDOT, weil bold) + Sessionname in normal
set -g status-left '#[bold,fg=#{@accent}]• #[nobold,fg=#{@fg_default}]#S '

##### RIGHT – NOTHING WIDGET ################################################

# Rechts: Ring + (bold = NDOT) + Datum + User
set -g status-right '\
#[fg=#{@fg_muted}]◦ \
#[nobold,fg=#{@accent}]%Y-%m-%d \
#[fg=#{@fg_muted}]▢ #(whoami) \
'

##### WINDOWS – CLEAN, AIRY #################################################

# Inaktive Fenster: leise, grau, kein Hintergrund
set-window-option -g window-status-format ' #[fg=#{@fg_muted}]#I #[fg=#{@fg_dim}]#W '

# Aktives Fenster: Bold (-> NDOT), Orange-Punkt + heller Text
set-window-option -g window-status-current-format ' #[bold,fg=#{@accent}]• #[fg=#{@fg_active}]#W #[nobold]'

# Keine extra Hintergründe für Fenster, nur Textfarben
set -g window-style 'fg=#{@fg_dim},bg=default'
set -g window-active-style 'fg=#{@fg_active},bg=default'

##### MISC / BEHAVIOUR ######################################################

set -g history-limit 50000

##### PANE BORDER WITH DOTMATRIX FONT (via BOLD) ###########################

# Pane border aktivieren
set -g pane-border-status top

set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#444444"

##### Text oben wird Dot-Matrix + rot/orange
set -g pane-border-format " #[bold]#[fg=#ff6a00]#{pane_host}#{b:pane_current_path}#[nobold] "
